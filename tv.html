<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<title>Pizzinatto — TV</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100vh;overflow:hidden;background:#080b12;font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased}

.root{display:grid;grid-template-rows:auto 1fr auto auto;height:100vh;padding:16px;gap:10px}

/* ── TÍTULO TOPO ── */
.titulo{text-align:center;flex-shrink:0}
.titulo h1{
  font-size:clamp(32px,5vw,72px);
  font-weight:900;
  letter-spacing:6px;
  text-transform:uppercase;
  color:#ffffff;
  line-height:1;
}

/* ── 4 CARDS ── */
.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;min-height:0}

.card{
  border-radius:20px;
  border:1px solid;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:24px 16px;
  gap:20px;
  min-height:0;
}

.card-pf  {border-color:#ffffff18;background:linear-gradient(160deg,#ffffff06 0%,#ffffff02 100%)}
.card-pj  {border-color:#f7c94f22;background:linear-gradient(160deg,#f7c94f08 0%,#f7c94f02 100%)}
.card-loja{border-color:#4fc3f722;background:linear-gradient(160deg,#4fc3f708 0%,#4fc3f702 100%)}
.card-lead{border-color:#1dd6a022;background:linear-gradient(160deg,#1dd6a008 0%,#1dd6a002 100%)}

.c-label{
  font-size:clamp(18px,2.8vw,48px);
  font-weight:800;
  letter-spacing:4px;
  text-transform:uppercase;
  text-align:center;
  line-height:1;
}
.c-value{
  font-size:clamp(80px,14vw,220px);
  font-weight:900;
  line-height:1;
  letter-spacing:-6px;
  text-align:center;
}

.card-pf   .c-label,.card-pf   .c-value{color:#ffffff}
.card-pj   .c-label,.card-pj   .c-value{color:#f7c94f}
.card-loja .c-label,.card-loja .c-value{color:#4fc3f7}
.card-lead .c-label,.card-lead .c-value{color:#1dd6a0}

/* ── SEÇÕES BOTTOM ── */
.bottom{background:#111520;border:1px solid #1a2035;border-radius:14px;padding:10px 16px 12px;display:flex;flex-direction:column;gap:6px;flex-shrink:0}
.bottom-espera{border-color:#ffffff18}
.bottom-atendidos{border-color:#f7c94f22}

.bottom-title{font-size:clamp(16px,2vw,30px);font-weight:700;letter-spacing:2px;text-transform:uppercase}
.bottom-espera   .bottom-title{color:#ffffff}
.bottom-atendidos .bottom-title{color:#f7c94f}

/* ── BARRAS VERTICAIS (em espera) ── */
.bars-h{display:flex;flex-direction:row;gap:8px;align-items:flex-end;height:140px}

.bar-col{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1;min-width:0;height:100%}
.bar-num-h{font-size:clamp(22px,2.5vw,38px);font-weight:900;text-align:center;flex-shrink:0;color:#ffffff}
.bar-track-v{flex:1;background:#ffffff1a;border-radius:4px;overflow:hidden;width:100%;min-height:0}
.bar-fill-v{width:100%;border-radius:4px;transition:height .6s ease;background:#ffffff}
.bar-name-h{font-size:clamp(16px,1.8vw,28px);font-weight:600;color:#ffffff;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:100%;flex-shrink:0}

/* ── RANKING HORIZONTAL (atendidos no dia) ── */
.ranking{display:flex;flex-direction:row;gap:12px;align-items:center;flex-wrap:nowrap;overflow:hidden}

.rank-item{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1;min-width:0}
.rank-pos{font-size:clamp(11px,1vw,16px);font-weight:700;color:#f7c94f88;letter-spacing:1px}
.rank-nome{font-size:clamp(14px,1.5vw,24px);font-weight:700;color:#ffffff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:100%;text-align:center}
.rank-bar-wrap{width:100%;height:28px;background:#f7c94f1a;border-radius:6px;overflow:hidden}
.rank-bar-fill{height:100%;border-radius:6px;background:#f7c94f;transition:width .6s ease}
.rank-count{font-size:clamp(20px,2.2vw,34px);font-weight:900;color:#f7c94f;text-align:center}

.rank-sem-dados{color:#2a3255;font-size:14px;padding:8px 0}

/* status */
.pill{position:fixed;top:12px;right:12px;font-size:11px;font-weight:700;padding:4px 12px;border-radius:20px;z-index:10;display:flex;align-items:center;gap:5px}
.pl{background:rgba(29,214,160,.12);color:#1dd6a0}
.pe{background:rgba(247,95,95,.12);color:#f75f5f}
.ps{background:rgba(79,142,247,.12);color:#4f8ef7}
.pd{background:rgba(247,201,79,.12);color:#f7c94f}
.dot{width:6px;height:6px;border-radius:50%;background:currentColor;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
</style>
</head>
<body>

<div class="pill pd" id="sp"><span class="dot"></span><span id="st">Conectando...</span></div>

<div class="root">

  <!-- TÍTULO -->
  <div class="titulo">
    <h1>Chats Aguardando</h1>
  </div>

  <!-- 4 CARDS -->
  <div class="cards">
    <div class="card card-pf">
      <div class="c-label">PF</div>
      <div class="c-value" id="w_pf">—</div>
    </div>
    <div class="card card-pj">
      <div class="c-label">PJ</div>
      <div class="c-value" id="w_pj">—</div>
    </div>
    <div class="card card-loja">
      <div class="c-label">Loja Online</div>
      <div class="c-value" id="w_loja">—</div>
    </div>
    <div class="card card-lead">
      <div class="c-label">Leads</div>
      <div class="c-value" id="leads_total">—</div>
    </div>
  </div>

  <!-- EM ESPERA POR ATENDENTE -->
  <div class="bottom bottom-espera">
    <div class="bottom-title">Atendimentos em espera</div>
    <div class="bars-h" id="bars-h">
      <div style="color:#2a3255;font-size:12px">Aguardando...</div>
    </div>
  </div>

  <!-- ATENDIDOS NO DIA POR VENDEDOR -->
  <div class="bottom bottom-atendidos">
    <div class="bottom-title">Atendidos hoje por vendedor</div>
    <div class="ranking" id="ranking">
      <div class="rank-sem-dados">Aguardando...</div>
    </div>
  </div>

</div>

<script>
const BASE     = window.location.origin;
const PROXY    = BASE + '/proxy';
const INTERVAL = 60;

function matchDept(name,key){
  const n=(name||'').trim();
  if(key==='pf')   return n==='Comercial - PF'||n==='Comercial PF';
  if(key==='pj')   return n==='Comercial - PJ'||n==='Comercial PJ';
  if(key==='loja') return n==='Loja Online'||n==='Loja - Online';
  return false;
}

function setSt(s,t){
  const m={demo:'pd',live:'pl',error:'pe',sync:'ps'};
  document.getElementById('sp').className='pill '+(m[s]||'pd');
  document.getElementById('st').textContent=t;
}
function setVal(id,val){
  if(val===undefined||val===null||val==='')return;
  const el=document.getElementById(id);if(!el)return;
  el.textContent=val;
}

function renderBarsH(list){
  if(!list||!list.length)return;
  const sorted=list.sort((a,b)=>b.count-a.count).slice(0,14);
  const max=sorted[0].count||1;
  document.getElementById('bars-h').innerHTML=sorted.map(a=>{
    const pct=Math.round((a.count/max)*100);
    const nome=a.name.split(' ')[0];
    return `<div class="bar-col">
      <div class="bar-num-h">${a.count}</div>
      <div class="bar-track-v">
        <div class="bar-fill-v" style="height:${pct}%"></div>
      </div>
      <div class="bar-name-h">${nome}</div>
    </div>`;
  }).join('');
}

function renderRanking(list){
  if(!list||!list.length){
    document.getElementById('ranking').innerHTML='<div class="rank-sem-dados">Sem dados de hoje</div>';
    return;
  }
  const sorted=list.sort((a,b)=>b.count-a.count).slice(0,14);
  const max=sorted[0].count||1;
  const medals=['🥇','🥈','🥉'];
  document.getElementById('ranking').innerHTML=sorted.map((a,i)=>{
    const pct=Math.round((a.count/max)*100);
    const nome=a.name.split(' ')[0];
    const pos=medals[i]||(i+1)+'º';
    return `<div class="rank-item">
      <div class="rank-pos">${pos}</div>
      <div class="rank-count">${a.count}</div>
      <div class="rank-bar-wrap"><div class="rank-bar-fill" style="width:${pct}%"></div></div>
      <div class="rank-nome">${nome}</div>
    </div>`;
  }).join('');
}

async function fetchOne(path,qs=''){
  try{
    const r=await fetch(PROXY+path+qs);
    const txt=await r.text();
    let d;try{d=JSON.parse(txt);}catch(e){return null;}
    if(d.__isHtml||d.__noToken||d.__tokenExpired)return null;
    if(!r.ok)return null;
    return d;
  }catch(e){return null;}
}

async function doFetch(){
  setSt('sync','...');
  try{
    const s=await fetch(BASE+'/status').then(r=>r.json());
    if(!s.ok&&!s.hasCredentials){setSt('error','Sem login');return;}
  }catch(e){setSt('error','Offline');return;}

  const ov=await fetchOne('/overview/');
  if(ov) setVal('leads_total',ov.qtd_screening_attendances);

  // Chats em espera → cards + barras por atendente
  const w=await fetchOne('/chats/metrics/','?status=waiting');
  if(w){
    (w?.data?.department||[]).forEach(item=>{
      const name=item.name,qty=item.quantity??0;
      if(matchDept(name,'pf'))   setVal('w_pf',  qty);
      if(matchDept(name,'pj'))   setVal('w_pj',  qty);
      if(matchDept(name,'loja')) setVal('w_loja', qty);
    });
    const atts=w?.data?.attendant||[];
    if(atts.length) renderBarsH(atts.map(x=>({name:x.name,count:x.quantity??0})));
  }

  // Atendidos no dia → ranking por vendedor
  // Tenta status=finished, fallback para status=closed
  let f=await fetchOne('/chats/metrics/','?status=finished');
  if(!f||!(f?.data?.attendant?.length)) f=await fetchOne('/chats/metrics/','?status=closed');
  if(f){
    const atts=f?.data?.attendant||[];
    renderRanking(atts.map(x=>({name:x.name,count:x.quantity??0})));
  }

  if(ov||w||f) setSt('live','Ao vivo');
  else setSt('error','Sem dados');
}

let timer=null;
function startAuto(){if(timer)clearInterval(timer);doFetch();timer=setInterval(doFetch,INTERVAL*1000);}
window.addEventListener('DOMContentLoaded',()=>startAuto());
</script>
</body>
</html>
